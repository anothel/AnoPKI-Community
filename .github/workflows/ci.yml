name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  community-boundary:
    name: Community boundary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Test Community boundary validator
        run: python scripts/test_validate_community_boundary.py
      - name: Validate Community boundary
        run: python scripts/validate-community-boundary.py

  docs-validation:
    name: Docs validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Validate docs
        run: python scripts/validate-docs.py
      - name: Test docs validator
        run: python scripts/test_validate_docs.py
      - name: Test local verification command list
        run: python scripts/test_verify_local.py
      - name: Test webhook receiver verification
        run: python scripts/test_webhook_receiver_verification.py

  service-contracts:
    name: Service contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Test service contract validator
        run: python scripts/test_validate_service_contracts.py
      - name: Validate service contracts
        run: python scripts/validate-service-contracts.py

  core-cli-contracts:
    name: Core CLI contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Test core CLI contract validator
        run: python scripts/test_validate_core_cli_contracts.py
      - name: Validate core CLI contracts
        run: python scripts/validate-core-cli-contracts.py

  release-metadata:
    name: Release metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Test version metadata validator
        run: python scripts/test_validate_version_metadata.py
      - name: Validate version metadata
        run: python scripts/validate-version-metadata.py
      - name: Test release metadata generator
        run: python scripts/test_generate_release_metadata.py
      - name: Test Go release verification runner
        run: python scripts/test_verify_go_release.py
      - name: Test release artifact validator
        run: python scripts/test_validate_release_artifacts.py
      - name: Test release evidence validator
        run: python scripts/test_validate_release_evidence.py
      - name: Validate release evidence
        run: python scripts/validate-release-evidence.py

  recovery-drill:
    name: SQLite recovery drill
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Test recovery drill
        run: python scripts/test_verify_recovery_drill.py
      - name: Run recovery drill
        run: >-
          python scripts/verify-recovery-drill.py
          --out-dir .tmp/recovery-evidence/ci
          --commit "${GITHUB_SHA}"
      - uses: actions/upload-artifact@v4
        with:
          name: anopki-recovery-verification
          path: .tmp/recovery-evidence/ci/
          if-no-files-found: error

  status-outage-drill:
    name: CRL and OCSP outage drill
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.12"
          cache-dependency-path: |
            service/go.mod
            service/go.sum
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Test status outage drill
        run: python scripts/test_verify_status_outage_drill.py
      - name: Run status outage drill
        run: >-
          python scripts/verify-status-outage-drill.py
          --out-dir .tmp/status-outage-evidence/ci
          --commit "${GITHUB_SHA}"
      - uses: actions/upload-artifact@v4
        with:
          name: anopki-status-outage-verification
          path: .tmp/status-outage-evidence/ci/
          if-no-files-found: error

  audit-replay-drill:
    name: Audit repair and dead-letter replay drill
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.12"
          cache-dependency-path: |
            service/go.mod
            service/go.sum
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python scripts/test_verify_audit_replay_drill.py
      - run: python scripts/verify-audit-replay-drill.py --out-dir .tmp/audit-replay-evidence/ci --commit "${GITHUB_SHA}"
      - uses: actions/upload-artifact@v4
        with:
          name: anopki-audit-replay-verification
          path: .tmp/audit-replay-evidence/ci/
          if-no-files-found: error

  issuer-rollover-drill:
    name: Intermediate issuer rollover drill
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.12"
          cache-dependency-path: |
            service/go.mod
            service/go.sum
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python scripts/test_verify_issuer_rollover_drill.py
      - run: python scripts/verify-issuer-rollover-drill.py --out-dir .tmp/issuer-rollover-evidence/ci --commit "${GITHUB_SHA}"
      - uses: actions/upload-artifact@v4
        with:
          name: anopki-issuer-rollover-verification
          path: .tmp/issuer-rollover-evidence/ci/
          if-no-files-found: error

  multi-node-reliability-drill:
    name: Multi-node reliability drill
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.12"
          cache-dependency-path: |
            service/go.mod
            service/go.sum
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python scripts/test_verify_multi_node_reliability.py
      - run: python scripts/verify-multi-node-reliability.py --out-dir .tmp/multi-node-evidence/ci --commit "${GITHUB_SHA}"
      - uses: actions/upload-artifact@v4
        with:
          name: anopki-multi-node-verification
          path: .tmp/multi-node-evidence/ci/
          if-no-files-found: error

  secret-baseline:
    name: Secret baseline scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Test secret baseline scanner
        run: python scripts/test_security_baseline_scan.py
      - name: Scan for committed secrets
        run: python scripts/security-baseline-scan.py

  go-baseline:
    name: Go baseline (${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ["1.25.12", "1.26.5"]
    defaults:
      run:
        working-directory: service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache-dependency-path: |
            service/go.mod
            service/go.sum
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Run Go baseline verification
        run: >-
          python ../scripts/verify-go-release.py
          --profile baseline
          --out-dir ../.tmp/go-evidence/baseline-${{ matrix.go }}
          --commit "${GITHUB_SHA}"
      - uses: actions/upload-artifact@v4
        with:
          name: anopki-go-baseline-${{ matrix.go }}
          path: .tmp/go-evidence/baseline-${{ matrix.go }}/
          if-no-files-found: error

  go-analysis:
    name: Go race and analysis
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          cache-dependency-path: |
            service/go.mod
            service/go.sum
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Run Go race and analysis verification
        run: >-
          python ../scripts/verify-go-release.py
          --profile analysis
          --out-dir ../.tmp/go-evidence/analysis-1.26.5
          --commit "${GITHUB_SHA}"
      - uses: actions/upload-artifact@v4
        with:
          name: anopki-go-analysis-1.26.5
          path: .tmp/go-evidence/analysis-1.26.5/
          if-no-files-found: error

  postgres-integration:
    name: PostgreSQL 16 integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: anopki_test
          POSTGRES_USER: anopki
          POSTGRES_PASSWORD: anopki
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U anopki -d anopki_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.12"
          cache-dependency-path: |
            service/go.mod
            service/go.sum
      - run: sudo apt-get update && sudo apt-get install -y postgresql-client
        working-directory: .
      - name: Record PostgreSQL version
        run: |
          psql --version
          PGPASSWORD=anopki psql -h localhost -U anopki -d anopki_test -Atc "SHOW server_version;"
      - run: go test -p 1 ./internal/store ./internal/httpapi -run PostgresIntegration -v
        env:
          ANOPKI_POSTGRES_TEST_DSN: postgres://anopki:anopki@localhost:5432/anopki_test?sslmode=disable

  postgres-recovery-drill:
    name: PostgreSQL 16 backup and restore drill
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: anopki_recovery_control
          POSTGRES_USER: anopki
          POSTGRES_PASSWORD: anopki
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U anopki -d anopki_recovery_control"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.12"
          cache-dependency-path: |
            service/go.mod
            service/go.sum
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - run: python scripts/test_verify_postgres_recovery_drill.py
      - name: Run PostgreSQL recovery drill
        run: >-
          python scripts/verify-postgres-recovery-drill.py
          --out-dir .tmp/postgres-recovery-evidence/ci
          --commit "${GITHUB_SHA}"
        env:
          ANOPKI_POSTGRES_RECOVERY_DSN: postgres://anopki:anopki@localhost:5432/anopki_recovery_control?sslmode=disable
      - uses: actions/upload-artifact@v4
        with:
          name: anopki-postgres-recovery-verification
          path: .tmp/postgres-recovery-evidence/ci/
          if-no-files-found: error

  cpp-core:
    name: C++ core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y cmake g++ libssl-dev pkg-config
      - name: Record C++ toolchain
        run: |
          cmake --version
          c++ --version
          pkg-config --modversion openssl
      - run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug
      - run: cmake --build build --config Debug
      - run: ctest --test-dir build -C Debug --output-on-failure

  cpp-fuzz-smoke:
    name: C++ fuzz smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y cmake clang libssl-dev pkg-config
      - name: Record fuzz toolchain
        run: |
          cmake --version
          clang++ --version
          pkg-config --modversion openssl
      - run: cmake -S . -B build-fuzz -DANOPKI_ENABLE_FUZZING=ON -DCMAKE_CXX_COMPILER=clang++
      - run: cmake --build build-fuzz --target anopki_core_csr_fuzz anopki_core_ocsp_fuzz anopki_core_crl_fuzz
      - run: timeout 30s ./build-fuzz/anopki_core_csr_fuzz -max_total_time=20
        env:
          ASAN_OPTIONS: detect_leaks=0:abort_on_error=1
      - run: timeout 30s ./build-fuzz/anopki_core_ocsp_fuzz -max_total_time=20
        env:
          ASAN_OPTIONS: detect_leaks=0:abort_on_error=1
      - run: timeout 30s ./build-fuzz/anopki_core_crl_fuzz -max_total_time=20
        env:
          ASAN_OPTIONS: detect_leaks=0:abort_on_error=1

  acme-harness:
    name: ACME harness self-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.12"
          cache-dependency-path: |
            service/go.mod
            service/go.sum
      - name: Run ACME harness tests
        shell: pwsh
        run: ./scripts/acme-smoke/test-run-certbot-smoke.ps1
      - run: echo "Harness passed; no live lego or certbot compatibility claim was produced."
