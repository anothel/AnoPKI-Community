name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  community-boundary:
    name: Community boundary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Test Community boundary validator
        run: python scripts/test_validate_community_boundary.py
      - name: Validate Community boundary
        run: python scripts/validate-community-boundary.py

  docs-validation:
    name: Docs validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Validate docs
        run: python scripts/validate-docs.py
      - name: Test docs validator
        run: python scripts/test_validate_docs.py
      - name: Test local verification command list
        run: python scripts/test_verify_local.py
      - name: Test webhook receiver verification
        run: python scripts/test_webhook_receiver_verification.py

  service-contracts:
    name: Service contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Test service contract validator
        run: python scripts/test_validate_service_contracts.py
      - name: Validate service contracts
        run: python scripts/validate-service-contracts.py

  core-cli-contracts:
    name: Core CLI contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Test core CLI contract validator
        run: python scripts/test_validate_core_cli_contracts.py
      - name: Validate core CLI contracts
        run: python scripts/validate-core-cli-contracts.py

  release-metadata:
    name: Release metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Test version metadata validator
        run: python scripts/test_validate_version_metadata.py
      - name: Validate version metadata
        run: python scripts/validate-version-metadata.py
      - name: Test release artifact validator
        run: python scripts/test_validate_release_artifacts.py
      - name: Test release evidence validator
        run: python scripts/test_validate_release_evidence.py
      - name: Validate release evidence
        run: python scripts/validate-release-evidence.py

  secret-baseline:
    name: Secret baseline scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Test secret baseline scanner
        run: python scripts/test_security_baseline_scan.py
      - name: Scan for committed secrets
        run: python scripts/security-baseline-scan.py

  go-service:
    name: Go service
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: anopki_test
          POSTGRES_USER: anopki
          POSTGRES_PASSWORD: anopki
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U anopki -d anopki_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.11"
          cache-dependency-path: |
            service/go.mod
            service/go.sum
      - run: go test ./...
      - run: go test -race ./...
        env:
          CGO_ENABLED: "1"
      - run: go vet ./...
      - run: go run honnef.co/go/tools/cmd/staticcheck@latest ./...
      - run: go run github.com/securego/gosec/v2/cmd/gosec@latest ./...
      - run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
      - run: go test -p 1 ./internal/store ./internal/httpapi -run PostgresIntegration -v
        env:
          ANOPKI_POSTGRES_TEST_DSN: postgres://anopki:anopki@localhost:5432/anopki_test?sslmode=disable
      - run: go build ./cmd/anopki-service

  cpp-core:
    name: C++ core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y cmake g++ libssl-dev
      - run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug
      - run: cmake --build build --config Debug
      - run: ctest --test-dir build -C Debug --output-on-failure

  cpp-fuzz-smoke:
    name: C++ fuzz smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y cmake clang libssl-dev
      - run: cmake -S . -B build-fuzz -DANOPKI_ENABLE_FUZZING=ON -DCMAKE_CXX_COMPILER=clang++
      - run: cmake --build build-fuzz --target anopki_core_csr_fuzz anopki_core_ocsp_fuzz anopki_core_crl_fuzz
      - run: ./build-fuzz/anopki_core_csr_fuzz -runs=1
      - run: ./build-fuzz/anopki_core_ocsp_fuzz -runs=1
      - run: ./build-fuzz/anopki_core_crl_fuzz -runs=1
