name: Release artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-artifacts:
    name: Build release artifacts
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: anopki_recovery_control
          POSTGRES_USER: anopki
          POSTGRES_PASSWORD: anopki
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U anopki -d anopki_recovery_control"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.12"
          cache-dependency-path: |
            service/go.mod
            service/go.sum
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: sudo apt-get update && sudo apt-get install -y cmake g++ libssl-dev pkg-config postgresql-client
      - uses: anchore/sbom-action/download-syft@v0.17.9
      - name: Record stable toolchain
        run: |
          go version
          cmake --version
          c++ --version
          pkg-config --modversion openssl
          psql --version
      - run: mkdir -p dist
      - name: Run supported-Go full verification
        run: >-
          python scripts/verify-go-release.py
          --profile full
          --out-dir .tmp/release-go-evidence
          --commit "${GITHUB_SHA}"
      - name: Package Go verification evidence
        run: |
          tar -czf dist/anopki-go-verification.tar.gz -C .tmp/release-go-evidence go-verification.json go-verification.md logs
      - name: Run SQLite recovery verification
        run: |
          python scripts/test_verify_recovery_drill.py
          python scripts/verify-recovery-drill.py --out-dir .tmp/release-recovery-evidence --commit "${GITHUB_SHA}"
      - name: Package recovery verification evidence
        run: |
          tar -czf dist/anopki-recovery-verification.tar.gz -C .tmp/release-recovery-evidence recovery-verification.json recovery-verification.md
      - name: Run PostgreSQL recovery verification
        run: |
          python scripts/test_verify_postgres_recovery_drill.py
          python scripts/verify-postgres-recovery-drill.py --out-dir .tmp/release-postgres-recovery-evidence --commit "${GITHUB_SHA}"
        env:
          ANOPKI_POSTGRES_RECOVERY_DSN: postgres://anopki:anopki@localhost:5432/anopki_recovery_control?sslmode=disable
      - name: Package PostgreSQL recovery verification evidence
        run: |
          tar -czf dist/anopki-postgres-recovery-verification.tar.gz -C .tmp/release-postgres-recovery-evidence postgres-recovery-verification.json postgres-recovery-verification.md postgres-recovery-test.log
      - name: Run CRL and OCSP outage verification
        run: |
          python scripts/test_verify_status_outage_drill.py
          python scripts/verify-status-outage-drill.py --out-dir .tmp/release-status-outage-evidence --commit "${GITHUB_SHA}"
      - name: Package status outage verification evidence
        run: |
          tar -czf dist/anopki-status-outage-verification.tar.gz -C .tmp/release-status-outage-evidence status-outage-verification.json status-outage-verification.md status-outage-test.log
      - name: Run audit repair and dead-letter replay verification
        run: |
          python scripts/test_verify_audit_replay_drill.py
          python scripts/verify-audit-replay-drill.py --out-dir .tmp/release-audit-replay-evidence --commit "${GITHUB_SHA}"
      - name: Package audit/replay verification evidence
        run: |
          tar -czf dist/anopki-audit-replay-verification.tar.gz -C .tmp/release-audit-replay-evidence audit-replay-verification.json audit-replay-verification.md audit-replay-test.log
      - name: Run Audit hash-chain integrity verification
        run: |
          python scripts/test_verify_audit_integrity_drill.py
          python scripts/verify-audit-integrity-drill.py --require-postgres --out-dir .tmp/release-audit-integrity-evidence --commit "${GITHUB_SHA}"
        env:
          ANOPKI_POSTGRES_TEST_DSN: postgres://anopki:anopki@localhost:5432/anopki_recovery_control?sslmode=disable
      - name: Package Audit integrity verification evidence
        run: |
          tar -czf dist/anopki-audit-integrity-verification.tar.gz -C .tmp/release-audit-integrity-evidence audit-integrity-verification.json audit-integrity-verification.md audit-integrity-baseline-test.log audit-integrity-postgres-test.log
      - name: Run generic authorization boundary verification
        run: |
          python scripts/test_verify_authorization_boundary.py
          python scripts/verify-authorization-boundary.py --out-dir .tmp/release-authorization-boundary-evidence --commit "${GITHUB_SHA}"
      - name: Package authorization boundary verification evidence
        run: |
          tar -czf dist/anopki-authorization-boundary-verification.tar.gz -C .tmp/release-authorization-boundary-evidence authorization-boundary-verification.json authorization-boundary-verification.md authorization-boundary-baseline.log authorization-boundary-race.log
      - name: Run intermediate issuer rollover verification
        run: |
          python scripts/test_verify_issuer_rollover_drill.py
          python scripts/verify-issuer-rollover-drill.py --out-dir .tmp/release-issuer-rollover-evidence --commit "${GITHUB_SHA}"
      - name: Package issuer rollover verification evidence
        run: |
          tar -czf dist/anopki-issuer-rollover-verification.tar.gz -C .tmp/release-issuer-rollover-evidence issuer-rollover-verification.json issuer-rollover-verification.md issuer-rollover-test.log
      - name: Run multi-node reliability verification
        run: |
          python scripts/test_verify_multi_node_reliability.py
          python scripts/verify-multi-node-reliability.py --out-dir .tmp/release-multi-node-evidence --commit "${GITHUB_SHA}"
      - name: Package multi-node reliability evidence
        run: |
          tar -czf dist/anopki-multi-node-verification.tar.gz -C .tmp/release-multi-node-evidence multi-node-verification.json multi-node-verification.md multi-node-test.log
      - name: Read release version
        run: |
          VERSION="$(cat VERSION)"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            test "${GITHUB_REF_NAME#v}" = "$VERSION"
            echo "RELEASE_MODE=tag" >> "$GITHUB_ENV"
          else
            echo "RELEASE_MODE=dry-run" >> "$GITHUB_ENV"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"
      - run: go build -ldflags "-X main.serviceVersion=${VERSION} -X main.serviceCommit=${GITHUB_SHA} -X main.serviceBuildTime=${BUILD_TIME}" -o ../dist/anopki-service ./cmd/anopki-service
        working-directory: service
      - run: cmake -S . -B build-release -DCMAKE_BUILD_TYPE=Release
      - run: cmake --build build-release --config Release
      - run: cp build-release/anopki-core dist/anopki-core
      - name: Record backend and provider policy metadata
        run: |
          ./dist/anopki-core backend info > dist/anopki-backend-info.json
          python scripts/generate-release-metadata.py \
            --backend-info dist/anopki-backend-info.json \
            --out dist/anopki-release-metadata.json \
            --version "$VERSION" \
            --commit "$GITHUB_SHA" \
            --build-time "$BUILD_TIME"
      - run: tar -czf "dist/anopki-service-v${VERSION}-linux-amd64.tar.gz" -C dist anopki-service
      - run: tar -czf "dist/anopki-core-v${VERSION}-linux-amd64.tar.gz" -C dist anopki-core
      - run: rm dist/anopki-service dist/anopki-core
      - run: sha256sum dist/*.tar.gz dist/anopki-backend-info.json dist/anopki-release-metadata.json > dist/SHA256SUMS
      - run: python scripts/validate-release-artifacts.py dist
      - run: syft scan dir:dist -o cyclonedx-json=dist/anopki.sbom.cdx.json
      - name: Record signing status
        run: |
          if [[ "$RELEASE_MODE" == "dry-run" ]]; then
            echo "Signing skipped: manual dry-run has no publishing or signing authority." > dist/SIGNING-STATUS.txt
          else
            echo "Signing pending: tag-only publish job must sign these artifacts." > dist/SIGNING-STATUS.txt
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: anopki-release-${{ github.run_id }}
          path: dist/
          if-no-files-found: error

  publish-tagged-release:
    name: Sign and publish tagged release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: build-artifacts
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Require a signed annotated tag
        run: |
          git cat-file -p "$GITHUB_REF_NAME" | grep -Eq -- '-----BEGIN (PGP|SSH) SIGNATURE-----'
      - uses: actions/download-artifact@v4
        with:
          name: anopki-release-${{ github.run_id }}
          path: dist
      - uses: sigstore/cosign-installer@v3.8.1
      - name: Sign release evidence
        run: |
          rm dist/SIGNING-STATUS.txt
          for artifact in dist/*.tar.gz dist/SHA256SUMS dist/*.json; do
            cosign sign-blob --yes \
              --output-signature "${artifact}.sig" \
              --output-certificate "${artifact}.pem" \
              "$artifact"
          done
          echo "Signed with cosign keyless signing in tag-only publish job." > dist/SIGNING-STATUS.txt
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/* \
              --title "$GITHUB_REF_NAME" \
              --notes-file CHANGELOG.md \
              --verify-tag
          fi
